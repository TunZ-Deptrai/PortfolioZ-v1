<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOANG TUANZ</title>
    <link rel="stylesheet" crossorigin href="/restored.css?v=project-clean-v2" />
    <!-- z-intro:start -->
    <style>
      html.z-intro-active,
      html.z-intro-active body {
        overflow: hidden;
      }

.logo-intro {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 72%, rgba(255, 255, 255, 0.035), transparent 20%),
        #0C0C0E;
      animation: introFadeOut 0.72s cubic-bezier(0.76, 0, 0.24, 1) 2.75s forwards;
      pointer-events: none;
    }

    .logo-intro::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.026) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 72%);
      opacity: 0;
      transform: scale(1.05);
      animation: introGridBreath 2.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .logo-intro::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0 34%, rgba(12,12,14,0.52) 76%, #0C0C0E 100%);
      opacity: 0;
      animation: introVignette 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .logo-intro__stage {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: min(78vw, 24rem);
      aspect-ratio: 1;
      transform: translateY(6px);
      animation: introStageExit 0.78s cubic-bezier(0.76, 0, 0.24, 1) 2.46s forwards;
    }

    .logo-intro__logo-wrap {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      transform: scale(0.76) rotate(-2deg);
      animation: introLogoReveal 1.28s cubic-bezier(0.16, 1, 0.3, 1) 1.26s forwards;
    }

    .logo-intro__logo {
      width: clamp(3.75rem, 10.8vw, 5.65rem);
      height: clamp(3.75rem, 10.8vw, 5.65rem);
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.18)) drop-shadow(0 0 16px rgba(225, 29, 72, 0.28));
    }

    .logo-intro__orbit {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(2.65rem, 6.8vw, 3.75rem);
      height: clamp(2.65rem, 6.8vw, 3.75rem);
      transform: translate3d(-50%, calc(64vh - 50%), 0) scale(0.34);
      opacity: 0;
      will-change: transform, opacity;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      animation: introStarFlight 1.28s cubic-bezier(0.16, 0.82, 0.18, 1) 0.08s forwards;
    }

    .logo-intro__flying-star {
      position: absolute;
      inset: 0;
      overflow: visible;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
      backface-visibility: hidden;
      transform: translateZ(0);
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.52)) drop-shadow(0 0 12px rgba(225,29,72,0.32));
      animation: introStarPulse 1.7s cubic-bezier(0.16, 1, 0.3, 1) 0.08s forwards;
    }

    .logo-intro__gemini-star {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: introStarTilt 1.28s cubic-bezier(0.2, 0.74, 0.16, 1) 0.08s forwards;
    }
    .logo-intro__trail {
      position: absolute;
      left: 50%;
      top: 56%;
      width: 1px;
      height: 42vh;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(225,29,72,0), rgba(225,29,72,0.34), rgba(255,255,255,0.22), transparent);
      opacity: 0;
      transform: translateX(-50%) translateY(16vh) scaleY(0.24);
      transform-origin: top center;
      will-change: transform, opacity;
      animation: introTrailRise 1.28s cubic-bezier(0.2, 0.86, 0.22, 1) 0.12s forwards;
    }

    .logo-intro__impact {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(6rem, 18vw, 9rem);
      aspect-ratio: 1;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.35);
      animation: introImpactRing 0.78s cubic-bezier(0.16, 1, 0.3, 1) 1.24s forwards;
    }

    .logo-intro__impact::after {
      content: "";
      position: absolute;
      inset: 24%;
      border: 1px solid rgba(225,29,72,0.24);
      border-radius: inherit;
    }

    .logo-intro__spark {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0.46rem;
      aspect-ratio: 1;
      background: #E11D48;
      clip-path: polygon(50% 0%, 62% 38%, 100% 50%, 62% 62%, 50% 100%, 38% 62%, 0% 50%, 38% 38%);
      opacity: 0;
      filter: drop-shadow(0 0 5px rgba(225,29,72,0.42));
      animation: introSparkBurst 0.82s cubic-bezier(0.16, 1, 0.3, 1) 1.32s forwards;
    }

    .logo-intro__spark--one { --spark-x: -5.2rem; --spark-y: -3.3rem; }
    .logo-intro__spark--two { --spark-x: 5.1rem; --spark-y: -2.2rem; width: 0.36rem; background: #FFFFFF; }
    .logo-intro__spark--three { --spark-x: 3.8rem; --spark-y: 4rem; width: 0.32rem; }

    .logo-intro__open-light {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(8rem, 22vw, 13rem);
      aspect-ratio: 1;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.28) 0%, rgba(225,29,72,0.2) 34%, rgba(225,29,72,0.08) 52%, transparent 70%);
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.16);
      transform-origin: center;
      will-change: transform, opacity;
      animation: introOpenLight 0.9s cubic-bezier(0.76, 0, 0.24, 1) 1.92s forwards;
    }
    @keyframes introGridBreath {
      0% { opacity: 0; transform: scale(1.06); }
      52% { opacity: 0.1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.98); }
    }

    @keyframes introVignette {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes introStarFlight {
      0% { opacity: 0; transform: translate3d(-50%, calc(64vh - 50%), 0) scale(0.34); }
      8% { opacity: 1; }
      100% { opacity: 1; transform: translate3d(-50%, -50%, 0) scale(1); }
    }


    @keyframes introStarTilt {
      0% { transform: rotate(0deg); }
      22% { transform: rotate(88deg); }
      72% { transform: rotate(88deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes introStarPulse {
      0%, 78% { transform: translateZ(0) scale(1); opacity: 1; }
      100% { transform: translateZ(0) scale(0.2); opacity: 0; }
    }

    @keyframes introTrailRise {
      0% { opacity: 0; transform: translate3d(-50%, 20vh, 0) scaleY(0.12); }
      18% { opacity: 0.66; }
      100% { opacity: 0; transform: translate3d(-50%, -22vh, 0) scaleY(0.16); }
    }

    @keyframes introImpactRing {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.35); }
      38% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.55); }
    }

    @keyframes introLogoReveal {
      0% { opacity: 0; transform: scale(0.76) rotate(-2deg); }
      38% { opacity: 1; transform: scale(1.04) rotate(0deg); }
      70% { opacity: 1; transform: scale(1) rotate(0deg); }
      100% { opacity: 0; transform: scale(0.94) rotate(1deg); }
    }

    @keyframes introSparkBurst {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.18) rotate(0deg); }
      32% { opacity: 1; transform: translate(calc(-50% + var(--spark-x)), calc(-50% + var(--spark-y))) scale(1) rotate(42deg); }
      100% { opacity: 0; transform: translate(calc(-50% + var(--spark-x)), calc(-50% + var(--spark-y) - 1rem)) scale(0.24) rotate(132deg); }
    }

    @keyframes introOpenLight {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.16); }
      32% { opacity: 0.86; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(4.8); }
    }
    @keyframes introStageExit {
      0% { opacity: 1; transform: translateY(6px) scale(1); }
      100% { opacity: 0; transform: translateY(-10px) scale(0.97); }
    }

    @keyframes introFadeOut {
      0% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-intro,
      .logo-intro::before,
      .logo-intro::after,
      .logo-intro__stage,
      .logo-intro__logo-wrap,
      .logo-intro__orbit,
      .logo-intro__flying-star,
      .logo-intro__trail,
      .logo-intro__impact,
      .logo-intro__spark,
      .logo-intro__open-light {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
      }
    }
    </style>
    <!-- z-intro:end -->
  </head>
  <body>
    <!-- z-intro:start -->
    <div id="z-intro" class="logo-intro" aria-hidden="true">
      <div class="logo-intro__stage">
        <span class="logo-intro__trail"></span>
        <span class="logo-intro__open-light"></span>
        <span class="logo-intro__impact"></span>
        <span class="logo-intro__spark logo-intro__spark--one"></span>
        <span class="logo-intro__spark logo-intro__spark--two"></span>
        <span class="logo-intro__spark logo-intro__spark--three"></span>
        <div class="logo-intro__logo-wrap">
          <img src="/Logo.png" alt="" class="logo-intro__logo" draggable="false" />
        </div>
        <div class="logo-intro__orbit">
                    <svg class="logo-intro__flying-star" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
            <defs>
              <linearGradient id="introGeminiStarGradient" x1="14" y1="8" x2="52" y2="58" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#ffffff" />
                <stop offset="0.48" stop-color="#fff7fb" />
                <stop offset="1" stop-color="#ffc2d1" />
              </linearGradient>
            </defs>
            <path class="logo-intro__gemini-star" d="M32 2C35.9 21.1 42.9 28.1 62 32C42.9 35.9 35.9 42.9 32 62C28.1 42.9 21.1 35.9 2 32C21.1 28.1 28.1 21.1 32 2Z" fill="url(#introGeminiStarGradient)" />
          </svg>
        </div>
      </div>
    </div>
    <!-- z-intro:end -->
    <div id="root"></div>
    <!-- z-intro:start -->
    <script>
      (() => {
        const intro = document.getElementById("z-intro");
        const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        document.documentElement.classList.add("z-intro-active");
        window.setTimeout(() => {
          intro?.remove();
          document.documentElement.classList.remove("z-intro-active");
          document.documentElement.classList.add("z-intro-complete");
        }, reduced ? 700 : 3550);
      })();
    </script>
    <!-- z-intro:end -->
    <!-- scroll-motion:start -->
    <script>
      (() => {
        const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (reduced) return;

        const revealConfig = [
          { selector: "#about > .grid", kind: "section" },
          { selector: "#about .profile-stage", kind: "profile" },
          { selector: "#about .relative.border-l > .relative", kind: "card" },
          { selector: "#about .py-16 > h3, #about .py-16 > div", kind: "section" },
          { selector: "#about .grid > .space-y-4, #about .grid > .bg-\\[\\#141416\\]", kind: "card" },
          { selector: "#work > .space-y-6", kind: "section" },
          { selector: "#work .grid > .group.cursor-pointer", kind: "card" },
          { selector: "#contact > .grid > div", kind: "section" },
          { selector: "footer > div > div", kind: "section" },
          { selector: "section span[class*='h-[1px]'], section div[class*='h-[1px]']", kind: "line" }
        ];

        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;
            const el = entry.target;
            el.classList.add("is-visible");
            observer.unobserve(el);

            const delay = Number.parseInt(el.style.getPropertyValue("--reveal-delay"), 10) || 0;
            window.setTimeout(() => {
              el.classList.remove("scroll-reveal", "is-visible");
              el.removeAttribute("data-reveal-kind");
              el.style.removeProperty("--reveal-delay");
            }, 760 + delay);
          });
        }, { threshold: 0.16, rootMargin: "0px 0px -10% 0px" });

        const seen = new WeakSet();
        let scheduled = 0;

        const prepareGroup = (items, kind) => {
          items.forEach((el, index) => {
            if (!el || seen.has(el) || el.closest("#hero")) return;
            seen.add(el);
            el.classList.add("scroll-reveal");
            el.dataset.revealKind = kind;
            el.style.setProperty("--reveal-delay", `${Math.min(index * 52, 260)}ms`);
            observer.observe(el);
          });
        };

        const prepare = () => {
          revealConfig.forEach(({ selector, kind }) => {
            try {
              prepareGroup(Array.from(document.querySelectorAll(selector)), kind);
            } catch {
              // Ignore rare selector parsing edge cases from generated utility classes.
            }
          });
        };

        const schedulePrepare = () => {
          window.clearTimeout(scheduled);
          scheduled = window.setTimeout(prepare, 80);
        };

        window.addEventListener("DOMContentLoaded", schedulePrepare, { once: true });
        window.addEventListener("load", schedulePrepare, { once: true });
        new MutationObserver(schedulePrepare).observe(document.getElementById("root"), { childList: true, subtree: true });
      })();
    </script>
    <!-- scroll-motion:end -->    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
